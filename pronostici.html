<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riepilogo pronostici - Totomondiale Cameg</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="page wide">
    <header class="hero compact-hero">
      <div class="brand-row">
        <img src="assets/logo.png" alt="Logo Totomondiale Cameg" class="logo" />
        <div>
          <p class="eyebrow">Riepilogo pronostici</p>
          <h1>Totomondiale Cameg</h1>
          <p class="subtitle">Vista compatta come nel file Excel: partecipanti in riga, partite in colonna.</p>
        </div>
      </div>
      <div class="refresh-card">
        <span>Ultimo aggiornamento risultati</span>
        <strong id="updatedAt">—</strong>
      </div>
    </header>

    <nav class="top-actions">
      <a class="nav-btn" href="index.html">Classifica</a>
      <a class="nav-btn active" href="pronostici.html">Riepilogo pronostici</a>
    </nav>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Tutti i pronostici</h2>
          <p class="hint">Verde = corretto, rosso = errato, bianco = partita non conclusa.</p>
        </div>
        <button id="reloadBtn" type="button">Aggiorna</button>
      </div>
      <div id="predictionSheets" class="prediction-sheets">
        <p>Caricamento riepilogo...</p>
      </div>
    </section>
  </main>

  <script src="assets/pronostici.js"></script>
</body>
</html>
