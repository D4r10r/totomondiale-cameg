name: Aggiorna risultati Mondiale 2026

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Aggiorna risultati
        run: node scripts/update-results.mjs

      - name: Commit risultati aggiornati
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/risultati-auto.json
          git commit -m "Aggiorna risultati automatici" || echo "Nessuna modifica"
          git push
